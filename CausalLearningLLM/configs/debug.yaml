experiment:
  name: "cra_debug"
  seed: 42
  output_dir: "outputs/debug"
  debug: true
  num_samples: 50
  batch_size: 4
  device: "auto"
  deterministic: true

dataset:
  name: "synthetic"
  split: "all"
  max_samples: 50
  use_synthetic_attributes: true
  sensitive_attributes: ["age_group", "gender"]
  spurious_attributes: ["hospital_type", "note_style"]
  correlation_strength: 0.8
  counterfactual_generation: true
  train_val_test_split: [0.6, 0.2, 0.2]

model:
  name: "distilgpt2"
  tokenizer_name: "distilgpt2"
  dtype: "float32"
  max_length: 128
  selected_layers: [0, 2, 5]
  extract_attentions: false
  pooling: "mean"
  answer_scoring: "log_prob"

probes:
  probe_types: ["logistic"]
  train_layers: [0, 2, 5]
  regularization: 1.0
  test_size: 0.3
  random_state: 42
  max_iter: 1000

cra:
  intervention_strengths: [0.5, 1.0, 2.0]
  direction_types: ["clinical_probe", "sensitive_probe", "spurious_probe", "random"]
  top_k_directions: 3
  layer_selection: [0, 2, 5]
  beta_privacy: 1.0
  eta_robustness: 1.0
  gamma_task: 0.5
  taxonomy_thresholds:
    clinical: 0.6
    sensitive: 0.55
    spurious: 0.55
    utility_loss: 0.1

baselines:
  enable_integrated_gradients: false
  enable_shap: false
  enable_attention_rollout: false
  enable_activation_patching: true
  enable_causal_tracing: false
  enable_inlp: true
  inlp_rounds: 3

evaluation:
  metrics: ["accuracy", "balanced_accuracy", "auroc", "cross_entropy"]
  bootstrap_samples: 100
  confidence_level: 0.95
  statistical_tests: ["paired_t", "wilcoxon"]

visualization:
  save_pdf: true
  save_svg: true
  save_png: true
  color_palette: "colorblind"
  figure_dpi: 150
